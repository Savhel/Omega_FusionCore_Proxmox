# Configuration du cluster omega-qemu-remote-memory.
#
# Ce fichier est sourcé par deploy.sh.
# omega-hook.pl a son propre bloc de config (même structure, syntaxe Perl).
#
# ─── Nœuds ───────────────────────────────────────────────────────────────────

# Nœud qui héberge les VMs et tourne node-a-agent.
NODE_A="pve1"

# Nœuds stores : autant que nécessaire.
# Chacun tournera node-bc-store et prêtera sa RAM.
STORE_NODES=("pve2" "pve3")
# Exemple à 4 nœuds : STORE_NODES=("pve2" "pve3" "pve4" "pve5")

# ─── Ports ───────────────────────────────────────────────────────────────────

STORE_PORT=9100    # TCP  — protocole pages
STATUS_PORT=9200   # HTTP — GET /status
