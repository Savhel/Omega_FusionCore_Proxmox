# Configuration du cluster omega-remote-paging.
#
# Ce fichier est sourcé par deploy.sh et uninstall.sh.
#
# ─── Nœuds ───────────────────────────────────────────────────────────────────

# Tous les nœuds du cluster : chacun héberge des VMs ET offre sa RAM comme store.
# Utiliser des IPs ou des hostnames résolvables depuis tous les nœuds.
OMEGA_NODES="10.10.0.11,10.10.0.12,10.10.0.13"
# Exemples :
#   OMEGA_NODES="pve,pve2,pve3"                          # hostnames
#   OMEGA_NODES="192.168.1.1,192.168.1.2,192.168.1.3"   # autre sous-réseau
#   OMEGA_NODES="pve,pve2,pve3,pve4"                     # 4 nœuds

# Nœud qui exécute le contrôleur (un seul au choix — arbitraire).
OMEGA_CONTROLLER="10.10.0.11"

# ─── Ports ───────────────────────────────────────────────────────────────────

STORE_PORT=9100    # TCP  — protocole pages
STATUS_PORT=9200   # HTTP — GET /status
