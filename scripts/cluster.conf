# GPU/proxy applicatif Omega.
# OMEGA_GPU_NODES vide = detection automatique au deploiement.
# OMEGA_GPU_PRIMARY_NODE vide = premier noeud GPU detecte.
# OMEGA_GPU_PROXY_URL vide = derivee depuis OMEGA_GPU_PRIMARY_NODE.
OMEGA_GPU_NODES="192.168.123.100,192.168.123.101,192.168.123.102"
OMEGA_GPU_PRIMARY_NODE="192.168.123.102"
OMEGA_GPU_PROXY_URL="http://192.168.123.102:9400"
# Active le démarrage/redémarrage automatique du proxy GPU par deploy-deb sur les
# nœuds GPU (sinon stoppé au déploiement et jamais relancé → tests section 6 en échec).
OMEGA_GPU_PROXY_ENABLED="1"
OMEGA_GPU_PROXY_LISTEN="0.0.0.0:9400"
OMEGA_GPU_PROXY_MAX_CONCURRENT="7"
OMEGA_GPU_PROXY_TOTAL_VRAM_MIB="0"
OMEGA_GPU_PROXY_BACKEND_TIMEOUT_SECS="60"
OMEGA_GPU_PROXY_API_TOKEN_FILE="/etc/omega/gpu-proxy.token"
OMEGA_GPU_MIGRATE_TO_GPU_NODE="1"
OMEGA_GPU_FALLBACK_NETWORK="1"

# Profil de création des VMs physiques par l'action [p].
OMEGA_VM_STORAGE="stockage.ceph"
OMEGA_VM_BRIDGE="vmbr1"
OMEGA_VM_TEMPLATE_ID="9001"
OMEGA_VM_IMAGE_REMOTE="/var/lib/vz/template/iso/omega-base-debian12.qcow2"
# DNS enspy-gi.gandal assuré par pfSense Unbound — pas de VM DNS séparée
OMEGA_VM_LINKED_CLONE="1"
OMEGA_VM_SSHKEY_REMOTE="/root/.ssh/id_rsa.pub"
OMEGA_VM_MEMORY="6144"
OMEGA_VM_BALLOON="512"
OMEGA_VM_CORES="4"
OMEGA_VM_SOCKETS="1"
OMEGA_VM_VCPUS="1"
OMEGA_VM_DISK_MAX_GIB="20"
OMEGA_VM_GPU_VRAM_MIB="4096"
# Modèle CPU exposé aux VMs. x86-64-v2-AES = baseline exigé par beaucoup d'images
# modernes (kafka/confluent, binaires Go/Rust optimisés). Modèle fixe → live-migration
# safe entre nœuds. kvm64 (ancien défaut) n'expose PAS x86-64-v2 → "Fatal glibc error".
OMEGA_VM_CPU_TYPE="x86-64-v2-AES"
OMEGA_VM_ROOT_PASSWORD="root"
OMEGA_PROVISION_RANDOMIZE="1"
OMEGA_PROVISION_RECREATE_BAD="1"
OMEGA_PROVISION_BOOT_WAIT_SECS="60"

# Clé SSH pour joindre les nœuds. VIDE = portable : chaque machine utilise
# ~/.ssh/omega_ed25519 si présent, sinon le SSH par défaut (agent/clé/mot de passe root).
# NE PAS mettre un chemin absolu machine-spécifique ici (casse la portabilité).
# Prérequis par machine : accès SSH root aux 3 nœuds (voir README « Lancer les tests »).
SSH_KEY=""

# ── Distribution des VMs par nœud ────────────────────────────────────────────
# Format : IP:max_vms,IP:max_vms,...
# Nœuds absents de la liste reçoivent OMEGA_VM_NODE_DEFAULT_MAX VMs chacun.
OMEGA_VM_NODE_DISTRIBUTION="192.168.123.100:1,192.168.123.101:2,192.168.123.102:2"
OMEGA_VM_NODE_DEFAULT_MAX="2"

# ── Réconciliateur de distribution (agent cluster-global, timer sur le contrôleur) ──
# Maintient EN CONTINU la cible ci-dessus par LIVE-MIGRATION (jamais de suppression :
# périmètre agent Omega). En sur-effectif il répartit l'excédent à parts égales (emilia
# reste le plus léger). S'installe avec omega-lab [W] ou install-distribution-reconciler-remote.sh.
OMEGA_RECONCILE_INTERVAL_SECS="120"
OMEGA_RECONCILE_MAX_MIGRATIONS_PER_TICK="1"   # anti-storm : 1 migration max par tick
OMEGA_RECONCILE_PIN_VMIDS="3009,3030,3031"  # VM de test pinnees (pas de migration pendant les tests)
OMEGA_RECONCILE_DRY_RUN="0"                   # 1 = observe seulement (log, pas de migration)

